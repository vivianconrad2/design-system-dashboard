*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',-apple-system,sans-serif;background:#F8F9FA;color:var(--color-neutral-600)}
.header{background:linear-gradient(135deg,var(--color-primary-700) 0%,var(--color-primary-500) 100%);padding:24px 32px 0;color:var(--color-neutral-0)}
.header h1{font-size:22px;font-weight:700;letter-spacing:-0.3px}
.header .sub{font-size:13px;opacity:.8;margin-top:4px}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.badge{padding:6px 12px;background:rgba(255,255,255,.15);border-radius:6px;font-size:12px;font-weight:600}
.tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.2)}
.tab{padding:10px 20px;border:none;cursor:pointer;font-size:13px;font-weight:600;border-radius:6px 6px 0 0;background:transparent;color:rgba(255,255,255,.85);font-family:inherit;transition:all .2s}
.tab.active{background:rgba(255,255,255,.95);color:var(--color-primary-700)}
.content{padding:24px 32px;max-width:1200px;margin:0 auto}
.card{background:var(--color-neutral-0);border-radius:10px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px}
.card h3{font-size:15px;font-weight:700;margin:0 0 2px}
.card .card-sub{font-size:12px;color:var(--color-neutral-400);margin:0 0 16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.metric-card{background:var(--color-neutral-0);border-radius:8px;padding:16px 14px;box-shadow:0 1px 3px rgba(0,0,0,.08);position:relative;border-top:3px solid var(--accent)}
.metric-val{font-size:28px;font-weight:700;color:var(--accent)}
.metric-label{font-size:12px;font-weight:600;color:var(--color-neutral-600);margin-top:2px}
.metric-sub{font-size:11px;color:var(--color-neutral-400);margin-top:2px}
.info-btn{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;border:1px solid var(--accent);background:var(--color-neutral-0);color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-family:inherit}
.info-btn.open{background:var(--accent);color:var(--color-neutral-0)}
.popover{position:absolute;top:32px;width:360px;background:var(--color-neutral-0);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.15);border:1px solid var(--color-neutral-200);padding:16px;z-index:100;font-size:12px;color:var(--color-neutral-500);line-height:1.6;display:none}
.popover.show{display:block}
.popover.right{right:0}
.popover.left{left:0}
.popover-title{font-size:13px;font-weight:700;color:var(--color-neutral-600);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.popover-close{background:none;border:none;cursor:pointer;font-size:16px;color:var(--color-neutral-400);padding:0 2px;line-height:1;font-family:inherit}
.pop-sep{border-top:1px solid var(--color-neutral-200);padding-top:8px;margin-top:8px;font-size:11px;color:var(--color-neutral-400)}
.pop-sep strong{color:var(--color-neutral-500)}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.legend-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.legend-name{font-size:13px;flex:1}
.legend-val{font-size:14px;font-weight:700}
.growth-box{padding:12px;border-radius:8px;text-align:center;flex:1}
.growth-num{font-size:28px;font-weight:700}
.growth-label{font-size:11px;color:var(--color-neutral-400)}
.highlight-bar{padding:10px 14px;border-radius:6px;font-size:12px}
.comp-row{padding:8px 12px;border-radius:6px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.comp-name{font-size:13px;font-weight:600}
.comp-type{font-size:10px;color:var(--color-neutral-400);background:var(--color-neutral-100);padding:2px 6px;border-radius:4px;flex-shrink:0}
.comp-issue{font-size:11px;color:var(--color-neutral-400);margin-top:2px}
.bar-track{height:8px;background:var(--color-neutral-200);border-radius:4px;overflow:hidden;flex:1}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.progress-row{display:flex;align-items:center;gap:8px;width:100%}
.progress-label{font-size:12px;color:var(--color-neutral-500);font-weight:600;min-width:40px;text-align:right}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-weight:700;color:var(--color-neutral-500);border-bottom:2px solid var(--color-neutral-200)}
td{padding:10px}
tr.alt{background:#FAFAFA}
.status-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
.priority-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.stat-card{padding:16px;background:#F8F9FA;border-radius:8px;border:1px solid var(--color-neutral-200);text-align:center}
.stat-icon{font-size:24px;margin-bottom:4px}
.stat-num{font-size:28px;font-weight:700}
.stat-label{font-size:13px;font-weight:600;color:var(--color-neutral-600)}
.stat-desc{font-size:11px;color:var(--color-neutral-400);margin-top:4px}
.stat-inline{text-align:center}
.stat-inline .val{font-size:24px;font-weight:700}
.stat-inline .lbl{font-size:11px;color:var(--color-neutral-400)}
.foundation-card{padding:14px;border-radius:8px}
.foundation-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.foundation-title{font-size:13px;font-weight:700}
.foundation-status{font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px}
.foundation-item{font-size:11px;color:var(--color-neutral-500);line-height:1.7}
.infra-box{padding:16px;border-radius:8px;font-size:12px;color:var(--color-neutral-500);line-height:1.6}
.infra-title{font-weight:700;font-size:14px;margin-bottom:8px}
.team-card{padding:16px;background:#F8F9FA;border-radius:8px;border:1px solid var(--color-neutral-200)}
.team-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.team-name{font-weight:700;font-size:14px}
.team-status{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:#E8F5E9;color:var(--color-status-success-default)}
.team-role{font-size:12px;color:var(--color-neutral-400);margin-bottom:4px}
.team-metric{font-size:12px;color:var(--color-primary-500);font-weight:600}
.gap-row{padding:10px 14px;background:#F0FAF0;border-radius:6px;margin-bottom:8px;border-left:3px solid var(--color-status-success-default)}
.gap-name{font-weight:600;font-size:13px}
.gap-by{font-size:12px;color:var(--color-neutral-400);margin-top:3px}
.readiness-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.readiness-label span:first-child{font-weight:600}
.readiness-label span:last-child{color:var(--color-neutral-400)}
.readiness-track{height:6px;background:var(--color-neutral-200);border-radius:3px;overflow:hidden}
.readiness-fill{height:100%;border-radius:3px}
.readiness-row{margin-bottom:10px}

.chart-container{display:flex;justify-content:space-around;align-items:flex-end;height:200px;padding:0 20px;border-bottom:1px solid var(--color-neutral-200)}
.chart-group{display:flex;align-items:flex-end;gap:4px;flex:1;justify-content:center}
.chart-bar-wrap{display:flex;flex-direction:column;align-items:center;width:32px}
.chart-bar-val{font-size:11px;font-weight:700;margin-bottom:4px}
.chart-bar{width:28px;border-radius:4px 4px 0 0;min-height:4px;transition:height .5s ease}
.chart-labels{display:flex;justify-content:space-around;margin-top:8px}
.chart-labels div{font-size:12px;color:var(--color-neutral-500);text-align:center;flex:1}
.chart-legend{display:flex;justify-content:center;gap:20px;margin-top:14px}
.chart-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-neutral-500)}
.chart-legend-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.hidden{display:none}

// DESIGN TOKENS — read from the vendored tokens.css at load time
// (assets/tokens.css for index.html, ../assets/tokens.css for
// dashboard/blueprint-status.html). The <link> in <head> is
// parser-blocking per HTML spec, so this IIFE can safely read
// CSS custom properties via getComputedStyle on first run.
// If the stylesheet fails to load (404, wrong deploy path, CSP),
// every getPropertyValue returns "" — we detect that and render
// a visible banner instead of letting charts silently render
// without color. Source: @unified_design_system/design-tokens.
// ═══════════════════════════════════════════════════════

var TOKENS = (function() {
  var cs = getComputedStyle(document.documentElement);
  var g = function(n) { return cs.getPropertyValue(n).trim(); };
  var t = {
    primary500: g('--color-primary-500'),
    primary600: g('--color-primary-600'),
    primary700: g('--color-primary-700'),
    neutral400: g('--color-neutral-400'),
    neutral500: g('--color-neutral-500'),
    neutral600: g('--color-neutral-600'),
    neutral200: g('--color-neutral-200'),
    neutral100: g('--color-neutral-100'),
    neutral0:   g('--color-neutral-0'),
    success:    g('--color-status-success-default'),
    successLt:  g('--color-status-success-light'),
    warning:    g('--color-status-warning-default'),
    warningLt:  g('--color-status-warning-light'),
    error:      g('--color-status-error-default'),
    errorLt:    g('--color-status-error-light')
  };
  var missing = Object.keys(t).filter(function(k) { return !t[k]; });
  if (missing.length) {
    console.error('[dashboard] tokens.css failed to load or is missing keys:', missing);
    document.addEventListener('DOMContentLoaded', function() {
      var banner = document.createElement('div');
      banner.setAttribute('role', 'alert');
      banner.style.cssText = 'background:#b70900;color:#fff;padding:12px 16px;font:13px/1.4 sans-serif';
      banner.innerHTML =
        '<strong>Design tokens failed to load.</strong> ' +
        missing.length + ' missing keys: ' + missing.join(', ') + '. ' +
        'Run <code>npm run sync:tokens</code> and hard-reload. ' +
        'Charts will render without color until this is fixed.';
      document.body.insertBefore(banner, document.body.firstChild);
    });
  }
  return t;
})();

    if (k === 'style' && typeof attrs[k] === 'object') {
      Object.assign(e.style, attrs[k]);
    } else if (k === 'className') {
      e.className = attrs[k];
    } else if (k === 'onclick') {
      e.onclick = attrs[k];
    } else if (k === 'innerHTML') {
      e.innerHTML = attrs[k];
    } else {
      e.setAttribute(k, attrs[k]);
    }
  });
  if (typeof children === 'string') e.innerHTML = children;
  else if (Array.isArray(children)) children.forEach(function(c) { if (c) e.appendChild(c); });
  else if (children instanceof HTMLElement) e.appendChild(children);
  return e;
}

function renderTabs() {
  var container = document.getElementById('tabs');

  ["Overview","Components","Pipeline","MCP Readiness","Gaps"].forEach(function(t) {
    var btn = el('button', {className: 'tab' + (activeTab === t ? ' active' : ''), onclick: function() { activeTab = t; openPopover = null; renderTabs(); renderContent(); }}, t);

function renderContent() {

  else if (activeTab === 'Components') renderSystems(c);
  else if (activeTab === 'MCP Readiness') renderMCPDocs(c);
}

// ── SVG Donut ───────────────────────────────────────
function svgDonut(data, size, thickness) {
  var total = data.reduce(function(s,d){return s+d.value},0);
  var r = (size - thickness) / 2;
  var circ = 2 * Math.PI * r;
  var cum = 0;
  var circles = data.map(function(d) {
    var pct = d.value / total;
    var offset = cum * circ;
    cum += pct;
    return '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+d.color+'" stroke-width="'+thickness+'" stroke-dasharray="'+pct*circ+' '+circ+'" stroke-dashoffset="'+ -offset +'" transform="rotate(-90 '+size/2+' '+size/2+')"/>';
  }).join('');
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+circles+'<text x="'+size/2+'" y="'+(size/2-6)+'" text-anchor="middle" style="font-size:22px;font-weight:700;fill:var(--color-neutral-600)">'+total+'</text><text x="'+size/2+'" y="'+(size/2+12)+'" text-anchor="middle" style="font-size:10px;fill:var(--color-neutral-400)">total</text></svg>';
}

// ── Priority Badge ──────────────────────────────────
function priorityBadge(p) {
  var m = {"Critical":{bg:"var(--color-status-error-light)",t:"var(--color-status-error-default)",b:"var(--color-status-error-default)"},"High":{bg:"#FFF3CD",t:"#8B6914",b:"var(--color-status-warning-default)"},"Medium-High":{bg:"#FFF3CD",t:"#8B6914",b:"var(--color-status-warning-default)"},"Medium":{bg:"var(--color-primary-100)",t:"var(--color-primary-500)",b:"var(--color-primary-500)"},"Low":{bg:"var(--color-neutral-100)",t:"var(--color-neutral-500)",b:"var(--color-neutral-300)"},"Part of Table":{bg:"var(--color-neutral-100)",t:"var(--color-neutral-400)",b:"var(--color-neutral-300)"}};
  var s = m[p] || m["Low"];
  return '<span class="priority-badge" style="background:'+s.bg+';color:'+s.t+';border:1px solid '+s.b+'">'+p+'</span>';
}

// ── Status color ────────────────────────────────────
function statusColor(s) { return {done:"var(--color-status-success-default)",partial:"var(--color-status-warning-default)",ready:"var(--color-primary-500)"}[s]||"var(--color-neutral-400)"; }
function statusLabel(s) { return {done:"Complete",partial:"Partial",ready:"Ready for Dev"}[s]||s; }

// ── Card wrapper ────────────────────────────────────
function card(title, sub, content) {
  var d = el('div', {className:'card'});
  if (title) d.appendChild(el('h3', null, title));
  if (sub) d.appendChild(el('p', {className:'card-sub'}, sub));
  if (typeof content === 'string') { var inner = el('div'); inner.innerHTML = content; d.appendChild(inner); }
  else if (content instanceof HTMLElement) d.appendChild(content);
  return d;
}

// ── Jira ticket link ──────────────────────────────────
// ConstructConnect Atlassian tenant. All PS-* tickets live under the PS project.
// Passing falsy (no ticket) returns empty string so it's safe to interpolate.
var JIRA_BASE = 'https://constructconnect.atlassian.net/browse/';
function jiraLink(ticket, extraStyle) {
  if (!ticket) return '';
  var s = 'color:var(--color-primary-500);text-decoration:none;font-weight:600' + (extraStyle ? ';' + extraStyle : '');
  return '<a href="' + JIRA_BASE + ticket + '" target="_blank" rel="noopener" style="' + s + '" title="Open ' + ticket + ' in Jira">' + ticket + '</a>';
}

// ═══════════════════════════════════════════════════════
// OVERVIEW TAB
// ═══════════════════════════════════════════════════════
function renderOverview(container) {
  // Computed display variables (derived from data — do not hardcode)
  var pMonoRepoTotal = completeComponents.length + partialComponents.length + pipelineStats.docsOnly;

  // Implementation trajectory — historical snapshots from UDS main git history.
  // Baselines count folders with .tsx + _stories/ + _tests/ on origin/main at
  // each milestone commit. Current value reads live from the dashboard.
  //   Dec 2025     = commit f9b8070f (2025-12-22) — Button, Input atoms only
  //   End of March = commit 0794924b (2026-03-31) — 15 atoms + 16 molecules + 2 orgs
  //   Now          = completeComponents.length (UDS main audit, Apr 21, 2026)
  var pDecBase = 2;
  var pEndMarch = 33;
  var pImplNow = completeComponents.length;
  var pFoundationIncrease = pEndMarch - pDecBase;
  var pFoundationPct = pDecBase > 0 ? Math.round(pFoundationIncrease / pDecBase * 100) : 0;
  var pAprilIncrease = pImplNow - pEndMarch;
  var pAprilPct = pEndMarch > 0 ? Math.round(pAprilIncrease / pEndMarch * 100) : 0;

  // Top metrics
  var metricsGrid = el('div', {className:'grid-3', style:{marginBottom:'24px'}});
  topMetrics.forEach(function(m, i) {
    var mc = el('div', {className:'metric-card', style:{'--accent':m.color}});
    mc.innerHTML = '<div class="metric-val">'+m.value+'</div><div class="metric-label">'+m.label+'</div><div class="metric-sub">'+m.sub+'</div>';

    // Info button + popover
    var btn = el('button', {className:'info-btn' + (openPopover===m.label?' open':''), onclick:function(e) {
      e.stopPropagation();
      openPopover = openPopover===m.label ? null : m.label;
      renderContent();
    }}, 'i');
    mc.appendChild(btn);

    if (openPopover === m.label && popoverData[m.label]) {
      var pop = el('div', {className:'popover show ' + (i>=3?'right':'left')});
      // Auto-linkify PS-XXXX tickets in popover body. Popover data is authored
      // as plain text (no pre-existing <a> tags around PS-*), so a simple global
      // replace is safe and avoids the browser-compat cost of lookbehind.
      var bodyHtml = popoverData[m.label].replace(/\b(PS-\d+)\b/g, function(t){return jiraLink(t);});
      pop.innerHTML = '<div class="popover-title"><span>'+m.label+'</span><button class="popover-close" onclick="openPopover=null;renderContent()">×</button></div>' + bodyHtml;
      mc.appendChild(pop);
    }
    metricsGrid.appendChild(mc);
  });
  container.appendChild(metricsGrid);

  // ── Component Countdown — how many left until 100% ─────────────────────
  // "Remaining" = on roadmap but not yet .tsx on main (In Progress + Planned + Docs Only).
  // Computed per-tier from atomicComparison so it stays in sync with the source arrays.
  var cdTotal     = atomicComparison.reduce(function(s,a){return s + a.extracted;}, 0);
  var cdDone      = atomicComparison.reduce(function(s,a){return s + a.monorepo;}, 0);
  var cdRemaining = cdTotal - cdDone;
  var cdPct       = cdTotal > 0 ? Math.round(cdDone / cdTotal * 100) : 0;

  var countdownCard = card('Component Countdown', cdRemaining+' components remaining on the roadmap · '+cdPct+'% shipped');
  var cdHtml = '<div style="display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center">';

  // Left: big hero number
  cdHtml += '<div style="padding:20px 24px;background:linear-gradient(135deg,#00838F 0%,#006978 100%);color:#fff;border-radius:12px;text-align:center;min-width:180px">';
  cdHtml += '<div style="font-size:52px;font-weight:700;line-height:1">'+cdRemaining+'</div>';
  cdHtml += '<div style="font-size:12px;font-weight:600;opacity:.9;margin-top:4px;text-transform:uppercase;letter-spacing:.5px">to go</div>';
  cdHtml += '<div style="font-size:11px;opacity:.8;margin-top:8px;border-top:1px solid rgba(255,255,255,.2);padding-top:8px">'+cdDone+' of '+cdTotal+' shipped</div>';
  cdHtml += '</div>';

  // Right: per-tier countdown + overall progress bar
  cdHtml += '<div>';
  cdHtml += '<div style="font-size:12px;font-weight:600;color:var(--color-neutral-500);margin-bottom:8px">By atomic level</div>';
  atomicComparison.forEach(function(a){
    var remaining = a.extracted - a.monorepo;
    var pct = a.extracted > 0 ? (a.monorepo / a.extracted) * 100 : 0;
    var doneColor = remaining === 0 ? 'var(--color-status-success-default)' : 'var(--color-neutral-500)';
    var remColor  = remaining === 0 ? 'var(--color-status-success-default)' : '#00838F';
    var remLabel  = remaining === 0 ? 'done!' : remaining+' to go';
    cdHtml += '<div style="display:grid;grid-template-columns:90px 1fr 90px;gap:10px;align-items:center;margin-bottom:6px">';
    cdHtml += '<div style="font-size:12px;font-weight:600;color:'+doneColor+'">'+a.level+'</div>';
    cdHtml += '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:var(--color-status-success-default)"></div></div>';
    cdHtml += '<div style="font-size:12px;font-weight:700;color:'+remColor+';text-align:right">'+remLabel+'</div>';
    cdHtml += '</div>';
  });

  // Overall progress bar
  cdHtml += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--color-neutral-200)">';
  cdHtml += '<div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--color-neutral-500);margin-bottom:6px">';
  cdHtml += '<span>Overall</span><span>'+cdDone+' / '+cdTotal+' &middot; '+cdPct+'%</span>';
  cdHtml += '</div>';
  cdHtml += '<div class="bar-track" style="height:12px"><div class="bar-fill" style="width:'+cdPct+'%;background:linear-gradient(90deg,var(--color-status-success-default) 0%,#00838F 100%)"></div></div>';
  cdHtml += '</div>';

  cdHtml += '</div>';
  cdHtml += '</div>';

  var cdDiv = el('div'); cdDiv.innerHTML = cdHtml;
  countdownCard.appendChild(cdDiv);
  countdownCard.style.marginBottom = '16px';
  container.appendChild(countdownCard);

  // ── Weekly Delivery Targets — path to 100% by May 22 ──────────────
  // Distributes cdRemaining evenly across 5 target weeks. Math: floor(remaining/5)
  // per week, plus 1 extra on the first `remaining % 5` weeks. Stays dynamic —
  // as components ship, cdRemaining drops and all week targets re-split automatically.
  // `kind: "target"` = counts toward the cdRemaining split.
  // `kind: "buffer"` = catch-up week; no work target, cushion for spillover.
  var weeks = [
    {label:"Week of Apr 20–24",   start:"2026-04-20", kind:"target", target:15},
    {label:"Week of Apr 27–May 1",start:"2026-04-27", kind:"target"},
    {label:"Week of May 4–8",     start:"2026-05-04", kind:"target", target:14},
    {label:"Week of May 11–15",   start:"2026-05-11", kind:"target"},
    {label:"Week of May 18–22",   start:"2026-05-18", kind:"target", target:2},
    {label:"Week of May 25–29",   start:"2026-05-25", kind:"buffer"}
  ];
  var targetWeeksCount = weeks.filter(function(w){return w.kind==='target';}).length;
  // Weeks with explicit targets use those; remaining pool distributes across unset weeks.
  var fixedTotal   = weeks.reduce(function(s,w){return s+(w.kind==='target'&&w.target!==undefined?w.target:0);},0);
  var dynamicCount = weeks.filter(function(w){return w.kind==='target'&&w.target===undefined;}).length;
  var dynamicPool  = Math.max(0, cdRemaining - fixedTotal);
  var base   = dynamicCount > 0 ? Math.floor(dynamicPool / dynamicCount) : 0;
  var extras = dynamicCount > 0 ? dynamicPool % dynamicCount : 0;
  var todayISO = new Date().toISOString().slice(0,10);

  // Context line — compare target pace against recent April velocity from the
  // growth card (+N over 21 days). Helps the viewer gauge feasibility.
  // Pace uses target-week count only (buffer weeks don't count toward the plan).
  var aprilPacePerWeek = pAprilIncrease > 0 ? (pAprilIncrease / 21 * 7) : 0;
  var targetAvg        = cdRemaining / targetWeeksCount;
  var paceVerdict;
  if (aprilPacePerWeek >= targetAvg) {
    paceVerdict = '<span style="color:var(--color-status-success-default);font-weight:700">On track</span> — April pace (~'+aprilPacePerWeek.toFixed(1)+'/week) exceeds the target average of '+targetAvg.toFixed(1)+'/week.';
  } else if (aprilPacePerWeek >= targetAvg * 0.75) {
    paceVerdict = '<span style="color:var(--color-status-warning-default);font-weight:700">At risk</span> — April pace (~'+aprilPacePerWeek.toFixed(1)+'/week) is below the target average of '+targetAvg.toFixed(1)+'/week.';
  } else {
    paceVerdict = '<span style="color:var(--color-status-error-default);font-weight:700">Behind</span> — April pace (~'+aprilPacePerWeek.toFixed(1)+'/week) is well below the '+targetAvg.toFixed(1)+'/week needed.';
  }

  // Build the priority-ordered list of remaining components to split across
  // the weeks. Order: In Progress first (closest to done) → Planned molecules →
  // Planned organisms → Planned templates. Stable alphabetization inside each
  // group makes the assignment reproducible between renders.
  var remainingOrdered = []
    .concat(partialComponents.slice().sort(function(a,b){return a.name.localeCompare(b.name);}))
    .concat(plannedComponents.filter(function(c){return c.type==='Molecule';}).slice().sort(function(a,b){return a.name.localeCompare(b.name);}))
    .concat(plannedComponents.filter(function(c){return c.type==='Organism';}).slice().sort(function(a,b){return a.name.localeCompare(b.name);}))
    .concat(plannedComponents.filter(function(c){return c.type==='Template';}).slice().sort(function(a,b){return a.name.localeCompare(b.name);}));

  // Assign components only to target weeks. Buffer weeks get an empty array.
  var weeklyAssignments = [];
  var assignIdx = 0;
  var dynamicSeen = 0;
  weeks.forEach(function(w){
    if (w.kind === 'target') {
      var count = w.target !== undefined ? w.target : base + (dynamicSeen < extras ? 1 : 0);
      if (w.target === undefined) dynamicSeen++;
      weeklyAssignments.push(remainingOrdered.slice(assignIdx, assignIdx + count));
      assignIdx += count;
    } else {
      weeklyAssignments.push([]);
    }
  });

  var targetsCard = card('Weekly Delivery Targets', 'Path to 100% by May 22 · May 25–29 reserved as catch-up / buffer · '+cdRemaining+' remaining across '+targetWeeksCount+' target weeks · click a week to see its components');

  var tHtml = '<div style="padding:12px 14px;background:#F8F9FA;border-radius:6px;margin-bottom:16px;font-size:12px;color:var(--color-neutral-500);line-height:1.5">' + paceVerdict + '</div>';

  // Column header
  tHtml += '<div style="display:grid;grid-template-columns:160px 72px 1fr 160px;gap:12px;padding:7px 12px;margin-bottom:6px;background:linear-gradient(135deg,#00838F 0%,#006978 100%);border-radius:6px;font-size:11px;color:#fff;text-transform:uppercase;letter-spacing:.5px;font-weight:700">';
  tHtml += '<div>Week</div><div style="text-align:center">Done / Goal</div><div>Week Progress</div><div style="text-align:right">Running Total</div>';
  tHtml += '</div>';
  tHtml += '<div style="display:flex;flex-direction:column;gap:8px">';
  var cumulative = cdDone;
  var dynamicIdx = 0;
  weeks.forEach(function(w, i){
    var isBuffer = w.kind === 'buffer';
    var target = 0;
    if (!isBuffer) {
      target = w.target !== undefined ? w.target : base + (dynamicIdx < extras ? 1 : 0);
      if (w.target === undefined) dynamicIdx++;
      cumulative += target;
    }
    var cumPct = Math.round(cumulative / cdTotal * 100);
    var isCurrent = w.start <= todayISO && (i === weeks.length - 1 || weeks[i+1].start > todayISO);
    var isOpen   = openWeek === i;
    // Buffer rows are visually muted: lighter bg, dashed border, gray text.
    var bg, border;
    if (isCurrent) {
      bg = '#FFF3CD';
      border = '2px solid var(--color-status-warning-default)';
    } else if (isOpen && !isBuffer) {
      bg = '#E8F4F6';
      border = '2px solid #00838F';
    } else if (isBuffer) {
      bg = '#FAFAFA';
      border = '1px dashed var(--color-neutral-300)';
    } else {
      bg = '#F8F9FA';
      border = '1px solid var(--color-neutral-200)';
    }
    var currentTag = isCurrent ? '<div style="font-size:10px;color:var(--color-status-warning-default);font-weight:700;text-transform:uppercase;margin-top:2px;margin-left:18px">this week</div>' : '';
    var bufferTag  = isBuffer  ? ' <span style="font-size:10px;color:var(--color-neutral-500);font-weight:700;text-transform:uppercase;margin-left:4px;background:var(--color-neutral-200);padding:1px 6px;border-radius:3px">buffer</span>' : '';
    // Buffer rows are not clickable (nothing to expand).
    var chevron = isBuffer ? '<span style="display:inline-block;width:12px;color:var(--color-neutral-300);margin-right:6px">·</span>' : '<span style="display:inline-block;transition:transform .2s;transform:rotate('+(isOpen?'90':'0')+'deg);color:var(--color-neutral-400);margin-right:6px">&#9656;</span>';
    var clickAttr = isBuffer ? '' : ' onclick="event.stopPropagation();openWeek=openWeek==='+i+'?null:'+i+';renderContent()"';
    var cursorStyle = isBuffer ? 'default' : 'pointer';
    var labelColor = isBuffer ? 'var(--color-neutral-400)' : 'var(--color-neutral-600)';
    // For the current week, compute shipped count to show ✓ done vs remaining.
    var shippedCount = isCurrent
      ? completeComponents.filter(function(c){ return c.ticket && recentlyMergedTickets.indexOf(c.ticket) !== -1; }).length
      : 0;
    var targetCell = isBuffer
      ? '<div style="font-size:12px;font-weight:600;color:var(--color-neutral-400);text-align:center;font-style:italic">catch-up</div>'
      : isCurrent
        ? '<div style="text-align:center;line-height:1.2"><div style="font-size:20px;font-weight:700;color:var(--color-status-success-default)">'+shippedCount+'/'+target+'</div><div style="font-size:10px;font-weight:600;color:var(--color-neutral-400);text-transform:uppercase;letter-spacing:.4px">done</div></div>'
        : '<div style="text-align:center;line-height:1.2"><div style="font-size:22px;font-weight:700;color:#00838F">'+target+'</div><div style="font-size:10px;font-weight:600;color:var(--color-neutral-400);text-transform:uppercase;letter-spacing:.4px">goal</div></div>';
    var trailingCell = isBuffer
      ? '<div style="font-size:11px;color:var(--color-neutral-400);text-align:right;font-style:italic">deadline ' + (w.start === '2026-05-25' ? 'May 22' : '') + '</div>'
      : isCurrent
        ? '<div style="text-align:right;line-height:1.5">' +
            '<div style="font-size:12px;font-weight:600;color:var(--color-neutral-500)">'+shippedCount+' / '+target+' <span style="font-weight:400;color:var(--color-neutral-400)">this week</span></div>' +
            '<div style="font-size:11px;color:var(--color-neutral-400)">'+cumulative+' shipped by end · '+cumPct+'% of roadmap</div>' +
          '</div>'
        : '<div style="text-align:right;line-height:1.5">' +
            '<div style="font-size:12px;font-weight:600;color:var(--color-neutral-500)">'+cumulative+' <span style="font-weight:400;color:var(--color-neutral-400)">shipped by end</span></div>' +
            '<div style="font-size:11px;color:var(--color-neutral-400)">'+cumPct+'% of roadmap</div>' +
          '</div>';
    tHtml += '<div'+clickAttr+' style="display:grid;grid-template-columns:160px 72px 1fr 160px;gap:12px;align-items:center;padding:10px 12px;background:'+bg+';border:'+border+';border-radius:6px;cursor:'+cursorStyle+';user-select:none">';
    tHtml += '<div style="font-size:13px;font-weight:600;color:'+labelColor+'"><div>'+chevron+w.label+bufferTag+'</div>'+currentTag+'</div>';
    tHtml += targetCell;
    // Bar shows per-week progress: shipped out of goal. Current week uses recentlyMergedTickets.
    // Future weeks show 0/target (nothing shipped yet). Buffer rows show empty muted bar.
    var barHtml;
    var barH = 'height:12px;border-radius:6px';
    if (isBuffer) {
      barHtml = '<div class="bar-track" style="'+barH+';opacity:.4"><div class="bar-fill" style="width:0%"></div></div>';
    } else if (isCurrent) {
      var weekDonePct = target > 0 ? Math.round(shippedCount / target * 100) : 0;
      var weekRemPct  = Math.max(0, 100 - weekDonePct);
      barHtml = '<div class="bar-track" style="'+barH+'"><div style="display:flex;height:100%;border-radius:6px;overflow:hidden">' +
        '<div style="width:'+weekDonePct+'%;background:var(--color-status-success-default)"></div>' +
        '<div style="width:'+weekRemPct+'%;background:#00838F;opacity:.2"></div>' +
        '</div></div>';
    } else {
      barHtml = '<div class="bar-track" style="'+barH+'"><div class="bar-fill" style="width:0%;background:var(--color-status-success-default)"></div></div>';
    }
    tHtml += barHtml;
    tHtml += trailingCell;
    tHtml += '</div>';

    // Expanded component list — target weeks only.
    if (isOpen && !isBuffer) {
      var list = weeklyAssignments[i] || [];
      // Shipped: cross-reference recentlyMergedTickets against completeComponents.
      // Only populated for the current week (recentlyMergedTickets is a rolling ~7-day window).
      var shipped = isCurrent
        ? completeComponents.filter(function(c){ return c.ticket && recentlyMergedTickets.indexOf(c.ticket) !== -1; })
        : [];
      tHtml += '<div onclick="event.stopPropagation()" style="margin:-4px 0 4px 0;padding:14px 16px;background:#F5FBFC;border:1px solid #00838F;border-top:none;border-radius:0 0 6px 6px">';

      // ── Shipped section ──────────────────────────────────────
      if (shipped.length > 0) {
        tHtml += '<div style="font-size:11px;font-weight:700;color:var(--color-status-success-default);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">'+shipped.length+' shipped this week</div>';
        tHtml += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:6px;margin-bottom:16px">';
        shipped.forEach(function(c){
          var ticketHtml = c.ticket ? ' <span style="font-size:11px;margin-left:6px">'+jiraLink(c.ticket,'font-size:11px')+'</span>' : '';
          tHtml += '<div style="padding:6px 10px;background:#F0FAF0;border:1px solid #C8E6C9;border-radius:4px;display:flex;align-items:center;gap:8px;font-size:12px">' +
                     '<span style="color:var(--color-status-success-default);font-weight:700;flex-shrink:0">✓</span>' +
                     '<span style="font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+c.name+'">'+c.name+'</span>' +
                     '<span class="comp-type">'+c.type+'</span>' +
                     ticketHtml +
                   '</div>';
        });
        tHtml += '</div>';
      }

      // ── Targeted section ─────────────────────────────────────
      tHtml += '<div style="font-size:11px;font-weight:700;color:#00838F;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">'+list.length+' component'+(list.length===1?'':'s')+' targeted for '+w.label+'</div>';
      tHtml += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:6px">';
      list.forEach(function(c){
        var statusFromPartial = partialComponents.indexOf(c) > -1;
        var statusLabel = statusFromPartial ? 'In Progress' : 'Planned';
        var statusColor = statusFromPartial ? 'var(--color-status-warning-default)' : '#00838F';
        var ticketHtml  = c.ticket ? ' <span style="font-size:11px;margin-left:6px">'+jiraLink(c.ticket, 'font-size:11px')+'</span>' : '';
        tHtml += '<div style="padding:6px 10px;background:#fff;border-radius:4px;display:flex;align-items:center;gap:8px;font-size:12px">' +
                   '<span class="status-dot" style="background:'+statusColor+';margin-right:0;flex-shrink:0" title="'+statusLabel+'"></span>' +
                   '<span style="font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+c.name+'">'+c.name+'</span>' +
                   '<span class="comp-type">'+c.type+'</span>' +
                   ticketHtml +
                 '</div>';
      });
      tHtml += '</div>';
      tHtml += '</div>';
    }
  });
  tHtml += '</div>';

  tHtml += '<div style="display:grid;grid-template-columns:160px 72px 1fr 160px;gap:12px;margin-top:10px;padding:0 12px;font-size:10px;color:var(--color-neutral-400);text-transform:uppercase;letter-spacing:.4px;font-weight:600">';
  tHtml += '<div>Week</div><div style="text-align:center">Done / Goal</div><div>Week Progress</div><div style="text-align:right">Running Total</div>';
  tHtml += '</div>';

  var tDiv = el('div'); tDiv.innerHTML = tHtml;
  targetsCard.appendChild(tDiv);
  targetsCard.style.marginBottom = '16px';
  container.appendChild(targetsCard);

  // Two-column: Donut + Growth
  var row = el('div', {className:'grid-2'});

  // Donut card — atomic-level breakdown of total roadmap
  var donutTotal = deliveryStatus.reduce(function(s,d){return s+d.value;},0);
  var donutCard = card('Component Breakdown by Atomic Level', donutTotal+' components — atoms, molecules, organisms, templates');
  var donutInner = el('div', {style:{display:'flex',alignItems:'center',gap:'20px'}});
  var donutSvg = el('div'); donutSvg.innerHTML = svgDonut(deliveryStatus, 160, 22);
  donutInner.appendChild(donutSvg);
  var legendDiv = el('div', {style:{flex:'1'}});
  legendDiv.innerHTML = '<div style="font-size:11px;color:var(--color-neutral-400);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Data Updated — April 22, 2026</div>';
  deliveryStatus.forEach(function(g) {
    legendDiv.innerHTML += '<div class="legend-item"><span class="legend-swatch" style="background:'+g.color+'"></span><span class="legend-name">'+g.name+'</span><span class="legend-val">'+g.value+'</span></div>';
  });
  donutInner.appendChild(legendDiv);
  donutCard.appendChild(donutInner);
  row.appendChild(donutCard);

  // Growth card — implementation trajectory
  var growthCard = card('Library Growth', 'Implementation on UDS main — Dec 2025 → Apr 22, 2026');
  growthCard.innerHTML += '<div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--color-neutral-500)">Foundation build — Dec 2025 → end of March 2026</div>';
  growthCard.innerHTML += '<div style="display:flex;gap:16px;margin-bottom:12px"><div class="growth-box" style="background:var(--color-primary-100)"><div class="growth-label">Dec 2025</div><div class="growth-num" style="color:var(--color-primary-600)">'+pDecBase+'</div><div class="growth-label">implemented</div></div><div style="display:flex;align-items:center;font-size:24px;color:var(--color-status-success-default)">→</div><div class="growth-box" style="background:#E8F5E9"><div class="growth-label">Mar 31, 2026</div><div class="growth-num" style="color:var(--color-status-success-default)">'+pEndMarch+'</div><div class="growth-label">implemented</div></div></div>';
  growthCard.innerHTML += '<div class="highlight-bar" style="background:#FFF3CD;color:#8B6914"><strong>+'+pFoundationIncrease+' components shipped</strong> over ~3 months — '+pFoundationPct+'% growth</div>';
  growthCard.innerHTML += '<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--color-neutral-200)"><div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--color-neutral-500)">April sprint — Apr 1 → Apr 22, 2026</div><div style="display:flex;gap:16px;margin-bottom:12px"><div class="growth-box" style="background:var(--color-primary-100)"><div class="growth-label">Apr 1, 2026</div><div class="growth-num" style="color:var(--color-primary-600)">'+pEndMarch+'</div><div class="growth-label">implemented</div></div><div style="display:flex;align-items:center;font-size:24px;color:var(--color-status-success-default)">→</div><div class="growth-box" style="background:#E8F5E9"><div class="growth-label">Apr 22, 2026</div><div class="growth-num" style="color:var(--color-status-success-default)">'+pImplNow+'</div><div class="growth-label">implemented</div></div></div><div class="highlight-bar" style="background:#FFF3CD;color:#8B6914"><strong>+'+pAprilIncrease+' components shipped</strong> in 21 days — '+pAprilPct+'% month-over-month</div></div>';
  // Bar = completion % within each tier (monorepo / extracted). Atoms at 100%, molecules
  // ~59%, organisms ~17%, templates 0%. Reads as "how done is this tier," not volume.
  var atomBars = '<div style="margin-top:16px"><div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--color-neutral-500)">By Atomic Level — % complete per tier (implemented / roadmap)</div>';
  atomicComparison.forEach(function(a) {
    var pct = a.extracted > 0 ? (a.monorepo / a.extracted) * 100 : 0;
    var pctLabel = Math.round(pct);
    atomBars += '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>'+a.level+'</span><span style="font-weight:600">'+a.monorepo+' / '+a.extracted+' &middot; '+pctLabel+'%</span></div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:var(--color-status-success-default)"></div></div></div>';
  });
  atomBars += '</div>';
  growthCard.innerHTML += atomBars;
  row.appendChild(growthCard);
  container.appendChild(row);

  // Component lists
  var listRow = el('div', {className:'grid-2', style:{marginTop:'16px'}});

  // Complete
  var compCard = card('Fully Complete — Monorepo Audit ('+completeComponents.length+')', "Vivian's audit: code + Storybook + JSON tokens + tests");
  completeComponents.forEach(function(c) {
    var ticketSuffix = c.ticket ? '<span style="font-size:11px;margin-left:8px">'+jiraLink(c.ticket, 'font-size:11px')+'</span>' : '';
    var badge = (c.ticket && recentlyMergedTickets.indexOf(c.ticket) !== -1) ? NEW_BADGE : '';
    compCard.innerHTML += '<div class="comp-row" style="background:#F0FAF0;border-left:3px solid var(--color-status-success-default)"><span style="display:flex;align-items:baseline;gap:0"><span class="comp-name">'+c.name+'</span>'+badge+ticketSuffix+'</span><span class="comp-type">'+c.type+'</span></div>';
  });
  listRow.appendChild(compCard);

  // Partial + Missing
  var rightCol = el('div', {style:{display:'flex',flexDirection:'column',gap:'16px'}});
  var partCard = card('Needs Attention ('+partialComponents.length+')', 'Working but missing tokens, docs, or naming fixes');
  partialComponents.forEach(function(c) {
    var ticketSuffix = c.ticket ? ' · ' + jiraLink(c.ticket, 'font-size:11px') : '';
    var badge = (c.ticket && recentlyMergedTickets.indexOf(c.ticket) !== -1) ? NEW_BADGE : '';
    partCard.innerHTML += '<div class="comp-row" style="background:#FFFDF5;border-left:3px solid var(--color-status-warning-default)"><div><span class="comp-name">'+c.name+'</span>'+badge+ticketSuffix+'<div class="comp-issue">'+c.issue+'</div></div><span class="comp-type">'+c.type+'</span></div>';
  });
  rightCol.appendChild(partCard);

  var missCard = card('Missing Documentation (0)', 'All components now have documentation');
  missCard.innerHTML += '<div style="padding:10px 12px;color:var(--color-status-success-default);font-size:12px;border-radius:6px;background:#F0FAF0;border-left:3px solid var(--color-status-success-default)">✅ All '+pMonoRepoTotal+' components with monorepo presence are documented. Logo documentation was added Feb 25, 2026.</div>';
  rightCol.appendChild(missCard);
  listRow.appendChild(rightCol);
  container.appendChild(listRow);
}

// ═══════════════════════════════════════════════════════
// PIPELINE TAB — GitLab CI/CD pipeline status for main branch
// ═══════════════════════════════════════════════════════
function renderPipeline(container) {
  // Status → color / icon / label mappings. 'manual' is a GitLab state meaning
  // the job exists but won't run unless triggered — show as muted gray.
  var PL_COLORS = {
    success:  'var(--color-status-success-default)',
    failed:   'var(--color-status-error-default)',
    canceled: 'var(--color-neutral-400)',
    running:  'var(--color-primary-500)',
    pending:  'var(--color-status-warning-default)',
    manual:   'var(--color-neutral-300)',
    skipped:  'var(--color-neutral-300)',
    created:  'var(--color-neutral-300)'
  };
  var PL_ICONS = { success:'&#10004;', failed:'&#10006;', canceled:'&#9995;', running:'&#8635;', pending:'&#9203;', manual:'&#9208;', skipped:'&#8212;', created:'&#8230;' };
  var plColor = function(s){ return PL_COLORS[s] || 'var(--color-neutral-400)'; };
  var plIcon  = function(s){ return PL_ICONS[s]  || '?'; };

  // "13m 45s" / "3m 24s" / "45s"
  var fmtDur = function(sec){
    if (!sec || sec < 1) return '—';
    var m = Math.floor(sec / 60), s = Math.round(sec - m * 60);
    if (m === 0) return s+'s';
    return m+'m '+(s < 10 ? '0' : '')+s+'s';
  };
  // Relative time: "2h ago" / "3d ago" / "just now"
  var fmtRel = function(iso){
    var then = new Date(iso).getTime();
    if (isNaN(then)) return iso;
    var diff = Math.max(0, (Date.now() - then) / 1000);
    if (diff < 60)     return Math.round(diff)+'s ago';
    if (diff < 3600)   return Math.round(diff/60)+'m ago';
    if (diff < 86400)  return Math.round(diff/3600)+'h ago';
    return Math.round(diff/86400)+'d ago';
  };

  var lp = gitlabLatestPipeline;
  var recent = gitlabRecentPipelines;

  // ── Card 1: Latest pipeline — hero ────────────────────────────────────
  var heroCard = card('Latest Pipeline on '+gitlabProject.branch, 'Snapshot: '+fmtRel(gitlabProject.snapshotAt)+' · UDS GitLab CI/CD');
  var heroHtml = '<div style="display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:center">';
  // Left: big status badge
  heroHtml += '<div style="padding:22px 26px;background:'+plColor(lp.status)+';color:#fff;border-radius:10px;text-align:center;min-width:140px">' +
                '<div style="font-size:40px;line-height:1">'+plIcon(lp.status)+'</div>' +
                '<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:6px">'+lp.status+'</div>' +
                '<div style="font-size:11px;opacity:.85;margin-top:4px">#'+lp.iid+'</div>' +
              '</div>';
  // Right: commit info
  heroHtml += '<div>';
  heroHtml += '<div style="font-size:15px;font-weight:700;color:var(--color-neutral-600);margin-bottom:6px">'+lp.commit_title+'</div>';
  if (lp.commit_ref) heroHtml += '<div style="font-size:12px;color:var(--color-neutral-500);margin-bottom:10px">'+lp.commit_ref.replace(/\b(PS-\d+)\b/g, function(m){return jiraLink(m, 'font-size:12px');})+'</div>';
  heroHtml += '<div style="display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--color-neutral-500)">';
  heroHtml += '<div><strong style="color:var(--color-neutral-600)">SHA:</strong> <code style="background:var(--color-neutral-100);padding:2px 6px;border-radius:3px">'+lp.sha+'</code></div>';
  heroHtml += '<div><strong style="color:var(--color-neutral-600)">Author:</strong> '+lp.author+'</div>';
  heroHtml += '<div><strong style="color:var(--color-neutral-600)">Source:</strong> '+lp.source+'</div>';
  heroHtml += '<div><strong style="color:var(--color-neutral-600)">Duration:</strong> '+fmtDur(lp.duration_seconds)+'</div>';
  heroHtml += '<div><strong style="color:var(--color-neutral-600)">Ran:</strong> '+fmtRel(lp.created_at)+'</div>';
  heroHtml += '</div>';
  heroHtml += '<div style="margin-top:12px"><a href="'+lp.web_url+'" target="_blank" rel="noopener" style="font-size:12px;color:var(--color-primary-500);text-decoration:none;font-weight:600">View pipeline on GitLab &rarr;</a></div>';
  heroHtml += '</div>';
  heroHtml += '</div>';
  var heroDiv = el('div'); heroDiv.innerHTML = heroHtml;
  heroCard.appendChild(heroDiv);
  container.appendChild(heroCard);

  // ── Card 2: Stages flow for latest pipeline ───────────────────────────
  var stagesCard = card('Stages — Pipeline #'+lp.iid, lp.stages.length+' stages executed in order · bar = relative duration');
  var maxStageDur = Math.max.apply(null, lp.stages.map(function(s){return s.duration || 0;})) || 1;
  var stagesHtml = '<div style="display:flex;flex-direction:column;gap:8px">';
  lp.stages.forEach(function(s, i){
    var widthPct = s.duration > 0 ? Math.max(3, (s.duration / maxStageDur) * 100) : 2;
    var labelColor = s.status === 'manual' ? 'var(--color-neutral-400)' : 'var(--color-neutral-600)';
    stagesHtml += '<div style="display:grid;grid-template-columns:28px 110px 1fr 70px;gap:10px;align-items:center">';
    stagesHtml += '<div style="text-align:center;color:'+plColor(s.status)+';font-size:16px;font-weight:700" title="'+s.status+'">'+plIcon(s.status)+'</div>';
    stagesHtml += '<div style="font-weight:700;font-size:13px;color:'+labelColor+'">'+s.name+' <span style="color:var(--color-neutral-400);font-weight:400;font-size:11px">('+s.jobs+(s.jobs===1?' job':' jobs')+')</span></div>';
    stagesHtml += '<div class="bar-track"><div class="bar-fill" style="width:'+widthPct+'%;background:'+plColor(s.status)+'"></div></div>';
    stagesHtml += '<div style="font-size:12px;color:var(--color-neutral-500);text-align:right">'+(s.duration > 0 ? fmtDur(s.duration) : 'not run')+'</div>';
    stagesHtml += '</div>';
  });
  stagesHtml += '</div>';
  var stagesDiv = el('div'); stagesDiv.innerHTML = stagesHtml;
  stagesCard.appendChild(stagesDiv);
  container.appendChild(stagesCard);

  // ── Card 3: Pipeline health (last 20 on main) ─────────────────────────
  var statusCounts = {success:0, failed:0, canceled:0, running:0, pending:0, manual:0, skipped:0, created:0};
  var successDurs = [];
  var bySource = {push:{total:0,success:0}, schedule:{total:0,success:0}, web:{total:0,success:0}, api:{total:0,success:0}};
  recent.forEach(function(p){
    if (statusCounts[p.status] !== undefined) statusCounts[p.status]++;
    if (p.status === 'success' && p.duration > 0) successDurs.push(p.duration);
    var src = bySource[p.source] || (bySource[p.source] = {total:0,success:0});
    src.total++;
    if (p.status === 'success') src.success++;
  });
  var nTotal = recent.length;
  var nSuccess = statusCounts.success;
  var successPct = nTotal > 0 ? Math.round(nSuccess / nTotal * 100) : 0;
  var avgDur = successDurs.length > 0 ? Math.round(successDurs.reduce(function(a,b){return a+b;},0) / successDurs.length) : 0;
  var sortedDurs = successDurs.slice().sort(function(a,b){return a-b;});
  var medianDur = sortedDurs.length > 0 ? sortedDurs[Math.floor(sortedDurs.length / 2)] : 0;

  var healthCard = card('Pipeline Health — last '+nTotal+' on '+gitlabProject.branch, 'Success rate, duration, and failure breakdown by trigger source');

  // Top stat row
  var healthHtml = '<div class="grid-4" style="margin-bottom:20px">';
  healthHtml += '<div class="stat-card"><div class="stat-num" style="color:'+plColor('success')+'">'+successPct+'%</div><div class="stat-label">Success Rate</div><div class="stat-desc">'+nSuccess+' of '+nTotal+' runs</div></div>';
  healthHtml += '<div class="stat-card"><div class="stat-num" style="color:var(--color-primary-500)">'+fmtDur(avgDur)+'</div><div class="stat-label">Avg Duration</div><div class="stat-desc">Successful runs only</div></div>';
  healthHtml += '<div class="stat-card"><div class="stat-num" style="color:var(--color-primary-600)">'+fmtDur(medianDur)+'</div><div class="stat-label">Median Duration</div><div class="stat-desc">Successful runs only</div></div>';
  healthHtml += '<div class="stat-card"><div class="stat-num" style="color:'+plColor('failed')+'">'+(statusCounts.failed + statusCounts.canceled)+'</div><div class="stat-label">Failed / Canceled</div><div class="stat-desc">'+statusCounts.failed+' failed · '+statusCounts.canceled+' canceled</div></div>';
  healthHtml += '</div>';

  // Stacked distribution bar
  healthHtml += '<div style="font-size:12px;font-weight:600;color:var(--color-neutral-500);margin-bottom:6px">Status distribution (last '+nTotal+')</div>';
  healthHtml += '<div style="display:flex;height:22px;border-radius:4px;overflow:hidden;background:var(--color-neutral-100);margin-bottom:14px">';
  ['success','failed','canceled','running','pending','manual'].forEach(function(s){
    var n = statusCounts[s] || 0;
    if (n > 0) {
      var segPct = n / nTotal * 100;
      healthHtml += '<div style="width:'+segPct+'%;background:'+plColor(s)+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700" title="'+s+': '+n+'">'+(segPct >= 8 ? n+' '+s : '')+'</div>';
    }
  });
  healthHtml += '</div>';

  // Source breakdown — push vs schedule
  healthHtml += '<div style="font-size:12px;font-weight:600;color:var(--color-neutral-500);margin-bottom:6px">By trigger source</div>';
  healthHtml += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px">';
  Object.keys(bySource).forEach(function(src){
    var b = bySource[src];
    if (b.total === 0) return;
    var pct = Math.round(b.success / b.total * 100);
    var pctColor = pct >= 80 ? plColor('success') : pct >= 50 ? plColor('pending') : plColor('failed');
    healthHtml += '<div style="padding:10px 12px;background:#F8F9FA;border-radius:6px;border:1px solid var(--color-neutral-200)">' +
                    '<div style="font-size:12px;font-weight:700;color:var(--color-neutral-600);text-transform:capitalize">'+src+'</div>' +
                    '<div style="font-size:11px;color:var(--color-neutral-400);margin-bottom:6px">'+b.success+' / '+b.total+' succeeded</div>' +
                    '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+pctColor+'"></div></div>' +
                    '<div style="font-size:11px;color:'+pctColor+';font-weight:700;margin-top:4px">'+pct+'%</div>' +
                  '</div>';
  });
  healthHtml += '</div>';

  var healthDiv = el('div'); healthDiv.innerHTML = healthHtml;
  healthCard.appendChild(healthDiv);
  container.appendChild(healthCard);

  // ── Card 4: Recent pipelines table ────────────────────────────────────
  var recentCard = card('Recent Pipelines ('+nTotal+')', 'Newest first · click IID to open on GitLab');
  var tblHtml = '<table><thead><tr>' +
                  '<th style="text-align:center;width:34px"></th>' +
                  '<th>IID</th>' +
                  '<th>SHA</th>' +
                  '<th>Source</th>' +
                  '<th>Duration</th>' +
                  '<th>When</th>' +
                '</tr></thead><tbody>';
  recent.forEach(function(p, i){
    var alt = i % 2 ? ' class="alt"' : '';
    tblHtml += '<tr'+alt+'>';
    tblHtml += '<td style="text-align:center;color:'+plColor(p.status)+';font-size:15px;font-weight:700" title="'+p.status+'">'+plIcon(p.status)+'</td>';
    tblHtml += '<td><a href="'+p.web_url+'" target="_blank" rel="noopener" style="color:var(--color-primary-500);text-decoration:none;font-weight:600">#'+p.iid+'</a></td>';
    tblHtml += '<td><code style="background:var(--color-neutral-100);padding:2px 6px;border-radius:3px;font-size:12px">'+p.sha+'</code></td>';
    tblHtml += '<td style="font-size:12px;color:var(--color-neutral-500);text-transform:capitalize">'+p.source+'</td>';
    tblHtml += '<td style="font-size:12px;color:var(--color-neutral-500)">'+fmtDur(p.duration)+'</td>';
    tblHtml += '<td style="font-size:12px;color:var(--color-neutral-400)">'+fmtRel(p.created_at)+'</td>';
    tblHtml += '</tr>';
  });
  tblHtml += '</tbody></table>';
  var recentDiv = el('div'); recentDiv.innerHTML = tblHtml;
  recentCard.appendChild(recentDiv);
  container.appendChild(recentCard);
}

// ═══════════════════════════════════════════════════════
// GAPS TAB
// ═══════════════════════════════════════════════════════
function renderGaps(container) {
  var gapCard = card('Unplanned Requests ('+remainingGaps.length+')', 'Requested or prototyped but not on the current roadmap — decide whether to promote, fold in, or deprecate');
  var tbl = '<table><thead><tr><th>#</th><th>Component</th><th>Priority</th><th>Category</th><th style="text-align:center">In Figma</th><th style="text-align:center">Tokens</th><th>Notes</th></tr></thead><tbody>';
  remainingGaps.forEach(function(g,i) {
    tbl += '<tr'+(i%2?' class="alt"':'')+'><td>'+(i+1)+'</td><td style="font-weight:600">'+g.name+'</td><td>'+priorityBadge(g.priority)+'</td><td style="color:var(--color-neutral-400);font-size:12px">'+g.category+'</td><td style="text-align:center">'+(g.inFigma?'✅':'❌')+'</td><td style="text-align:center">'+(g.hasTokens?'🟡':'❌')+'</td><td style="font-size:12px;color:var(--color-neutral-400)">'+(g.note||'—')+'</td></tr>';
  });
  tbl += '</tbody></table>';
  var tblDiv = el('div'); tblDiv.innerHTML = tbl;
  gapCard.appendChild(tblDiv);
  container.appendChild(gapCard);

  var row = el('div', {className:'grid-2'});

  // Closed
  var closedCard = card('Closed Gaps ('+closedGaps.length+' resolved)', 'System-level decisions on how each pattern is addressed — decomposition or rejection. Not every piece has shipped, but the approach is decided.');
  closedGaps.forEach(function(g) {
    var closedByHtml = g.closedBy.replace(/\b(PS-\d+)\b/g, function(t){return jiraLink(t, 'font-size:11px');});
    closedCard.innerHTML += '<div class="gap-row"><div class="gap-name">'+g.name+'</div><div class="gap-by">'+closedByHtml+'</div></div>';
  });
  row.appendChild(closedCard);

  // Readiness
  var readCard = card('Post-Roadmap Readiness', 'Items beyond the current roadmap — how close each is to having specs documented');
  gapReadiness.forEach(function(r) {
    var color = r.level>=50?'var(--color-status-success-default)':r.level>=25?'var(--color-status-warning-default)':'var(--color-status-error-default)';
    readCard.innerHTML += '<div class="readiness-row"><div class="readiness-label"><span>'+r.label+'</span><span>'+r.note+'</span></div><div class="readiness-track"><div class="readiness-fill" style="width:'+r.level+'%;background:'+color+'"></div></div></div>';
  });
  row.appendChild(readCard);
  container.appendChild(row);
}

// ═══════════════════════════════════════════════════════
// COMPONENTS (SYSTEMS) TAB
// ═══════════════════════════════════════════════════════
function renderSystems(container) {
  // ── All Components card: full roadmap inventory by atomic level ─────
  // Merges completeComponents + partialComponents + plannedComponents +
  // docsOnlyComponents into a single view so PM + eng can scan every
  // component in one place. Status dot matches the "deliveryStatus" donut.
  var STATUS_COLORS = {
    "Complete":   'var(--color-status-success-default)',
    "In Progress":'var(--color-status-warning-default)',
    "Planned":    '#00838F',
    "Docs Only":  '#6B3FA0'
  };
  var allComps = []
    .concat(completeComponents.map(function(c){ return {name:c.name, type:c.type, ticket:c.ticket||"", status:"Complete"}; }))
    .concat(partialComponents.map (function(c){ return {name:c.name, type:c.type, ticket:c.ticket||"", status:"In Progress"}; }))
    .concat(plannedComponents.map (function(c){ return {name:c.name, type:c.type, ticket:c.ticket||"", status:"Planned"}; }))
    .concat(docsOnlyComponents.map(function(c){ return {name:c.name, type:c.type, ticket:c.ticket||"", status:"Docs Only"}; }));
  var byType = {Atom:[], Molecule:[], Organism:[], Template:[]};
  allComps.forEach(function(c){ if (byType[c.type]) byType[c.type].push(c); });
  Object.keys(byType).forEach(function(t){ byType[t].sort(function(a,b){ return a.name.localeCompare(b.name); }); });

  var allCard = card('All Components ('+allComps.length+')', 'Full roadmap inventory — UDS main audit, Apr 22, 2026');

  // Legend
  var legend = '<div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:16px;padding:10px 12px;background:#F8F9FA;border-radius:6px;font-size:12px">';
  ['Complete','In Progress','Planned','Docs Only'].forEach(function(s){
    legend += '<div style="display:flex;align-items:center;gap:6px"><span class="status-dot" style="background:'+STATUS_COLORS[s]+';margin-right:0"></span>'+s+'</div>';
  });
  legend += '</div>';

  var grid = '<div class="grid-4" style="align-items:start">';
  [{k:'Atom',label:'Atoms'},{k:'Molecule',label:'Molecules'},{k:'Organism',label:'Organisms'},{k:'Template',label:'Templates'}].forEach(function(col){
    var items = byType[col.k];
    // Per-tier status counts for the column header breakdown.
    var counts = {"Complete":0,"In Progress":0,"Planned":0,"Docs Only":0};
    items.forEach(function(c){ if (counts.hasOwnProperty(c.status)) counts[c.status]++; });
    var breakdown = '<div style="display:flex;flex-wrap:wrap;gap:6px 10px;margin-bottom:10px;font-size:11px;color:var(--color-neutral-500)">';
    ['Complete','In Progress','Planned','Docs Only'].forEach(function(s){
      if (counts[s] > 0) {
        breakdown += '<span style="display:inline-flex;align-items:center;gap:4px"><span class="status-dot" style="background:'+STATUS_COLORS[s]+';margin-right:0;width:8px;height:8px"></span><span style="font-weight:700;color:var(--color-neutral-600)">'+counts[s]+'</span> '+s+'</span>';
      }
    });
    breakdown += '</div>';
    grid += '<div style="background:#F8F9FA;border:1px solid var(--color-neutral-200);border-radius:8px;padding:12px">';
    grid += '<div style="font-size:13px;font-weight:700;color:var(--color-neutral-600);margin-bottom:8px;display:flex;align-items:center;gap:8px"><span>'+col.label+'</span><span style="background:var(--color-primary-500);color:#fff;padding:2px 8px;border-radius:12px;font-size:11px">'+items.length+'</span></div>';
    grid += breakdown;
    items.forEach(function(c){
      var ticketHtml = c.ticket ? '<span style="font-size:10px;margin-left:6px">' + jiraLink(c.ticket, 'font-size:10px') + '</span>' : '';
      var badge = (c.ticket && recentlyMergedTickets.indexOf(c.ticket) !== -1) ? NEW_BADGE : '';
      grid += '<div style="padding:5px 8px;background:#fff;border-radius:4px;margin-bottom:3px;font-size:12px;display:flex;align-items:center;gap:6px">' +
                '<span class="status-dot" style="background:'+STATUS_COLORS[c.status]+';margin-right:0;flex-shrink:0" title="'+c.status+'"></span>' +
                '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+c.name+(c.ticket?' · '+c.ticket:'')+'">'+c.name+'</span>' +
                badge +
                ticketHtml +
              '</div>';
    });
    if (!items.length) grid += '<div style="font-size:11px;color:var(--color-neutral-400);padding:8px">None on roadmap</div>';
    grid += '</div>';
  });
  grid += '</div>';

  var inner = el('div');
  inner.innerHTML = legend + grid;
  allCard.appendChild(inner);
  container.appendChild(allCard);

  var sorted = systems.slice().sort(function(a,b){return (b.implemented/b.components)-(a.implemented/a.components)});

  var sysCard = card('Component Readiness Overview', systems.length+' groups by feature area');
  var tbl = '<table><thead><tr><th>Group</th><th style="text-align:center">Components</th><th style="text-align:center">Extraction</th><th style="width:35%">Implementation</th><th style="text-align:center">Status</th></tr></thead><tbody>';
  sorted.forEach(function(s,i) {
    var pct = s.components>0 ? (s.implemented/s.components*100) : 0;
    var sc = statusColor(s.status);
    tbl += '<tr'+(i%2?' class="alt"':'')+'><td style="font-weight:600">'+s.name+'</td><td style="text-align:center">'+s.components+'</td><td style="text-align:center">✅</td><td><div class="progress-row"><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+sc+'"></div></div><span class="progress-label">'+s.implemented+'/'+s.components+'</span></div></td><td style="text-align:center"><span class="status-dot" style="background:'+sc+'"></span><span style="font-size:12px">'+statusLabel(s.status)+'</span></td></tr>';
  });
  tbl += '</tbody></table>';
  var tblDiv = el('div'); tblDiv.innerHTML = tbl;
  sysCard.appendChild(tblDiv);
  container.appendChild(sysCard);

  // Foundation
  var foundCard = card('Foundation Health', 'Token architecture and accessibility status');
  foundCard.innerHTML += '<div class="grid-4"><div class="foundation-card" style="border:1px solid #C8E6C9;background:#FAFFF9"><div class="foundation-header"><span class="foundation-title">Color System</span><span class="foundation-status" style="background:#E8F5E9;color:var(--color-status-success-default)">Complete</span></div><div class="foundation-item">• 3-tier architecture</div><div class="foundation-item">• WCAG contrast verified</div></div><div class="foundation-card" style="border:1px solid #C8E6C9;background:#FAFFF9"><div class="foundation-header"><span class="foundation-title">Typography</span><span class="foundation-status" style="background:#E8F5E9;color:var(--color-status-success-default)">Complete</span></div><div class="foundation-item">• Montserrat</div><div class="foundation-item">• 3 weights (500/600/700)</div><div class="foundation-item">• 12 styles total</div></div><div class="foundation-card" style="border:1px solid #FFE0B2;background:#FFFDF5"><div class="foundation-header"><span class="foundation-title">Spacing</span><span class="foundation-status" style="background:#FFF3CD;color:#8B6914">Tokens defined</span></div><div class="foundation-item">• 4px base scale</div><div class="foundation-item">• Component tokens set</div><div class="foundation-item">• Visual docs needed</div></div><div class="foundation-card" style="border:1px solid #C8E6C9;background:#FAFFF9"><div class="foundation-header"><span class="foundation-title">Motion</span><span class="foundation-status" style="background:#E8F5E9;color:var(--color-status-success-default)">Complete</span></div><div class="foundation-item">• 200ms standard</div><div class="foundation-item">• 150ms selection</div><div class="foundation-item">• ease-out/in/in-out</div></div></div>';
  container.appendChild(foundCard);

  // Infrastructure
  var infraCard = card('Infrastructure', 'Storybook and deployment status');
  infraCard.innerHTML += '<div class="grid-2"><div class="infra-box" style="background:#F0FAF0;border:1px solid #C8E6C9"><div class="infra-title">Storybook (Dev)</div>✅ Live at blueprint-dev.app.constructconnect.com<br>✅ VPN-only access, Cloud Run infrastructure<br>✅ GitLab CI/CD fully operational<br>✅ 50+ components with usage guides</div><div class="infra-box" style="background:var(--color-primary-100);border:1px solid var(--color-primary-200)"><div class="infra-title">NPM Package</div>✅ @unified_design_system/components<br>✅ Cloudsmith registry distribution<br>✅ Auto-update via CI/CD (no version pinning)<br>✅ Dual-approval adoption process</div></div>';
  container.appendChild(infraCard);
}

    bpHTML += '<span style="font-size:10px;font-weight:700;color:#8B6914;background:'+badge+';padding:2px 8px;border-radius:10px">'+t.server+'</span>';
    bpHTML += '</div>';
    bpHTML += '<div style="font-size:11px;color:var(--color-neutral-500);line-height:1.4">'+t.desc+'</div>';

  bpHTML += '</div>';

  // SKILLS + PLUGIN
  bpHTML += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">';
  bpHTML += '<div style="padding:14px;background:#F3E5F5;border:1px solid #CE93D8;border-radius:8px">';
  bpHTML += '<div style="font-size:13px;font-weight:700;color:#4A148C;margin-bottom:6px">🧩 New Skills (PS-4357)</div>';

  bpHTML += '<code>/validate-tokens</code> — runs token structure validation, category breakdown<br>';

  bpHTML += '15 bundled skills · replaces coco-ai-marketplace contribution path';

  bpHTML += '</div>';

  bpHTML += '<div class="highlight-bar" style="background:#E3F2FD;color:#01579B;border:1px solid #90CAF9"><strong>⭐ Repo-scan capability:</strong> The original question "which components could be replaced with UDS equivalents?" is answered by the planned <code>validate_composition</code> tool. It accepts <code>componentName + uiElements[]</code>, fuzzy-matches against inventory <code>cssClass</code> + component names, and returns violations with severity <code>error</code> (implemented candidates) or <code>warning</code> (pending candidates). Ticket: <a href="https://constructconnect.atlassian.net/browse/PS-4357" target="_blank" style="color:#01579B;text-decoration:underline">PS-4357</a>.</div>';
  bpHTML += '<div class="highlight-bar" style="background:#FFF3CD;color:#8B6914;border:1px solid #FFE082;margin-top:8px"><strong>📂 Sources:</strong> <code>apps/uds-mcp-server-remote/src/tools/</code> · <code>apps/uds-mcp-server-local/src/tools/</code> · <code>apps/MCP_ARCHITECTURE.md</code> · <code>docs/AI_TOOLING_IMPLEMENTATION.md</code> · all within <code>constructconnect/product-development/unified-design/unified_design_system</code> (project 74215032).</div>';
  var bpContent = el('div');
  bpContent.innerHTML = bpHTML;
  bpCard.appendChild(bpContent);
  container.appendChild(bpCard);

  // Header card with status
  var headerCard = card('Behavioral Specifications Status', 'Complete specifications that define, guide, validate, and reference');

  var headerHTML = '<div style="display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:start">';

  // Left: Green metrics box
  headerHTML += '<div style="padding:24px;background:#E8F5E9;border:2px solid #C8E6C9;border-radius:8px;min-width:260px;text-align:center">';

  headerHTML += '<div style="font-size:11px;color:var(--color-neutral-400);margin-bottom:20px">With behavioral specs</div>';
  headerHTML += '<div style="font-size:32px;color:var(--color-status-success-default);margin-bottom:8px">✅</div>';

  headerHTML += '<div style="font-size:14px;color:var(--color-neutral-500);font-weight:600;margin-bottom:4px">Specs Complete</div>';

  headerHTML += '</div>';

  // Right: Three info boxes stacked

  headerHTML += '</div></div>';

  var headerContent = el('div');
  headerContent.innerHTML = headerHTML;
  headerCard.appendChild(headerContent);
  container.appendChild(headerCard);

  // Specification Standards card
  var reqCard = card('Specification Standards for Human-Built Components', '5 requirements ensure complete specifications for developer implementation');
  var requirements = [
    {num:1,title:"Organization",status:"Complete",desc:"Component naming & hierarchy"},
    {num:2,title:"States",status:"Complete",desc:"All states defined"},
    {num:3,title:"Tokens",status:"Complete",desc:"Token mappings specified"},

    html += '<div style="padding:20px;background:#F0FAF0;border:2px solid #C8E6C9;border-radius:8px;text-align:center"><div style="font-size:28px;font-weight:700;color:var(--color-status-success-default);margin-bottom:8px">'+r.num+'</div><div style="font-size:14px;font-weight:700;color:var(--color-neutral-600);margin-bottom:6px">'+r.title+'</div><div style="font-size:12px;color:#5F6368;margin-bottom:8px">'+r.desc+'</div><div style="font-size:13px;font-weight:600;color:var(--color-status-success-default)">✅ '+r.status+'</div></div>';

  var content = el('div');
  content.innerHTML = html;
  reqCard.appendChild(content);
  container.appendChild(reqCard);

  // Components breakdown
  var totalComps = mcpDocsComponents.atoms.length + mcpDocsComponents.molecules.length + mcpDocsComponents.organisms.length + mcpDocsComponents.templates.length;
  var breakdownCard = card('Components with Behavioral Specifications ('+totalComps+')', 'Complete developer documentation with all states, motion, and WCAG requirements');

  // Grid layout for four columns
  var grid = el('div', {className:'grid-4'});

  // Atoms column
  var atomsCard = el('div', {style:{background:'#F8F9FA',border:'1px solid var(--color-neutral-200)',borderRadius:'8px',padding:'16px'}});
