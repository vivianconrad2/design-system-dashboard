*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',-apple-system,sans-serif;background:#F8F9FA;color:#1C1F22}
.header{background:linear-gradient(135deg,#01304A 0%,#0C79A8 100%);padding:24px 32px 0;color:#fff}

.badge{padding:6px 12px;background:rgba(255,255,255,.15);border-radius:6px;font-size:12px;font-weight:600}
.tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.2)}
.tab{padding:10px 20px;border:none;cursor:pointer;font-size:13px;font-weight:600;border-radius:6px 6px 0 0;background:transparent;color:rgba(255,255,255,.85);font-family:inherit;transition:all .2s}
.tab.active{background:rgba(255,255,255,.95);color:#01304A}
.content{padding:24px 32px;max-width:1200px;margin:0 auto}
.card{background:#fff;border-radius:10px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px}
.card h3{font-size:15px;font-weight:700;margin:0 0 2px}
.card .card-sub{font-size:12px;color:#88888E;margin:0 0 16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.metric-card{background:#fff;border-radius:8px;padding:16px 14px;box-shadow:0 1px 3px rgba(0,0,0,.08);position:relative;border-top:3px solid var(--accent)}
.metric-val{font-size:28px;font-weight:700;color:var(--accent)}
.metric-label{font-size:12px;font-weight:600;color:#1C1F22;margin-top:2px}
.metric-sub{font-size:11px;color:#88888E;margin-top:2px}
.info-btn{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;border:1px solid var(--accent);background:#fff;color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-family:inherit}
.info-btn.open{background:var(--accent);color:#fff}
.popover{position:absolute;top:32px;width:360px;background:#fff;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.15);border:1px solid #E7E6E5;padding:16px;z-index:100;font-size:12px;color:#4A4F55;line-height:1.6;display:none}
.popover.show{display:block}
.popover.right{right:0}
.popover.left{left:0}
.popover-title{font-size:13px;font-weight:700;color:#1C1F22;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.popover-close{background:none;border:none;cursor:pointer;font-size:16px;color:#88888E;padding:0 2px;line-height:1;font-family:inherit}
.pop-sep{border-top:1px solid #E7E6E5;padding-top:8px;margin-top:8px;font-size:11px;color:#88888E}
.pop-sep strong{color:#4A4F55}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.legend-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.legend-name{font-size:13px;flex:1}
.legend-val{font-size:14px;font-weight:700}
.growth-box{padding:12px;border-radius:8px;text-align:center;flex:1}
.growth-num{font-size:28px;font-weight:700}
.growth-label{font-size:11px;color:#88888E}
.highlight-bar{padding:10px 14px;border-radius:6px;font-size:12px}

var activeTab = "Overview";

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'style' && typeof attrs[k] === 'object') {
      Object.assign(e.style, attrs[k]);
    } else if (k === 'className') {
      e.className = attrs[k];
    } else if (k === 'onclick') {
      e.onclick = attrs[k];
    } else if (k === 'innerHTML') {
      e.innerHTML = attrs[k];
    } else {
      e.setAttribute(k, attrs[k]);
    }
  });
  if (typeof children === 'string') e.innerHTML = children;
  else if (Array.isArray(children)) children.forEach(function(c) { if (c) e.appendChild(c); });
  else if (children instanceof HTMLElement) e.appendChild(children);
  return e;
}

function renderTabs() {

    container.appendChild(btn);
  });
}

function renderContent() {
  var c = document.getElementById('content');

  else if (activeTab === 'Gaps') renderGaps(c);
  else if (activeTab === 'Components') renderSystems(c);
  else if (activeTab === 'MCP Readiness') renderMCPDocs(c);
}

// ── SVG Donut ───────────────────────────────────────
function svgDonut(data, size, thickness) {
  var total = data.reduce(function(s,d){return s+d.value},0);
  var r = (size - thickness) / 2;
  var circ = 2 * Math.PI * r;
  var cum = 0;
  var circles = data.map(function(d) {
    var pct = d.value / total;
    var offset = cum * circ;
    cum += pct;
    return '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+d.color+'" stroke-width="'+thickness+'" stroke-dasharray="'+pct*circ+' '+circ+'" stroke-dashoffset="'+ -offset +'" transform="rotate(-90 '+size/2+' '+size/2+')"/>';
  }).join('');
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+circles+'<text x="'+size/2+'" y="'+(size/2-6)+'" text-anchor="middle" style="font-size:22px;font-weight:700;fill:#1C1F22">'+total+'</text><text x="'+size/2+'" y="'+(size/2+12)+'" text-anchor="middle" style="font-size:10px;fill:#88888E">total</text></svg>';
}

// ── Priority Badge ──────────────────────────────────
function priorityBadge(p) {
  var m = {"Critical":{bg:"#FEF1EF",t:"#B70900",b:"#B70900"},"High":{bg:"#FFF3CD",t:"#8B6914",b:"#ED7800"},"Medium-High":{bg:"#FFF3CD",t:"#8B6914",b:"#ED7800"},"Medium":{bg:"#F2FAFE",t:"#0C79A8",b:"#0C79A8"},"Low":{bg:"#F4F4F4",t:"#4A4F55",b:"#DAD8D7"},"Part of Table":{bg:"#F4F4F4",t:"#88888E",b:"#DAD8D7"}};
  var s = m[p] || m["Low"];
  return '<span class="priority-badge" style="background:'+s.bg+';color:'+s.t+';border:1px solid '+s.b+'">'+p+'</span>';
}

function statusLabel(s) { return {done:"Complete",partial:"Partial",ready:"Ready for Dev"}[s]||s; }

// ── Card wrapper ────────────────────────────────────
function card(title, sub, content) {
  var d = el('div', {className:'card'});
  if (title) d.appendChild(el('h3', null, title));
  if (sub) d.appendChild(el('p', {className:'card-sub'}, sub));
  if (typeof content === 'string') { var inner = el('div'); inner.innerHTML = content; d.appendChild(inner); }
  else if (content instanceof HTMLElement) d.appendChild(content);
  return d;
}
